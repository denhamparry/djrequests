name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test:unit

      # Playwright end-to-end tests are intentionally excluded here. Adding
      # them requires browser installation (npx playwright install) and a
      # preview server, which is out of scope for this workflow. Extend with a
      # separate `e2e` job when needed.
