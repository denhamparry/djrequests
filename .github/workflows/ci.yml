name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    env:
      # apps-script/format.ts formats timestamps with toLocaleString and no
      # explicit timeZone, and the fixture in format.test.ts asserts the BST
      # rendering (20:30 from 19:30Z). Pin the job to Europe/London so CI
      # matches local dev until the formatter takes an explicit timeZone.
      TZ: Europe/London
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test:unit

      # Playwright end-to-end tests are intentionally excluded here. Adding
      # them requires browser installation (npx playwright install) and a
      # preview server, which is out of scope for this workflow. Extend with a
      # separate `e2e` job when needed.
